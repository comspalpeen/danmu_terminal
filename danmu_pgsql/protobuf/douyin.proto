    }
message ListUser {
    User user = 1;
    uint64 linkmic_id = 2;
    string linkmic_id_str = 3;
    int32 link_status = 4;
    int32 link_type = 5;
    int32 user_position = 6;
    int32 silence_status = 7;
    uint64 modify_time = 8;
    uint64 linker_id = 9;
    int32 role_type = 10;
    uint64 mc_status = 12;
    uint64 is_background = 13;
    bool pk_available = 16;
    string linkmic_unique_id = 17;
    uint64 k_song_uid = 18;
    string extra = 200;
}
message LinkerLinkedListChangeContent {
      repeated ListUser linked_users = 1;
      repeated ListUser pre_link_users = 2;
      uint64 version = 3;
      int32 push_type = 4;
      map<int64,RoomLinkerContent>  linker_content_map = 5;
      int32 update_mode = 6;
    }
message RoomLinkerContent {
    repeated ListUser linked_users = 1;
    int32 room_link_silence_status = 2;
    uint64 anchor_id = 3;
    uint64 is_anchor_background = 4;
    uint64 version = 5;
    uint64 live_room_mode = 6;
    string anchor_open_id = 5000;
}
// 新增：全局房间数据同步消息
message RoomDataSyncMessage {
    Common common = 1;
    uint64 room_id = 2;
    string sync_key = 3;             // 核心标识，例如 "RoomLinkMicSyncData"
    uint64 version = 4;
    RoomLinkMicSyncData payload = 5; // 连麦的真实数据负载
    string log_id = 6;
}

// 新增：连麦同步具体数据
message RoomLinkMicSyncData {
    repeated ListUser linked_users = 1; // 麦上用户列表 (完美复用我们之前的 ListUser)
    SyncMeta meta = 3;                  // 场景元数据
}

// 新增：连麦场景元数据
message SyncMeta {
    uint64 scene = 1; // 连麦场景，8 代表观众连线
}
message RoomMessage {
  Common common = 1;
}